<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巷子裡 - 店家後台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: #f0f2f5; }
.header { background: #2c3e7a; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; }
.stats { display: flex; gap: 12px; padding: 16px; }
.stat-card { background: white; border-radius: 10px; padding: 16px; flex: 1; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 28px; font-weight: bold; color: #2c3e7a; }
.stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
.filter-bar { padding: 0 16px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #2c3e7a; background: white; color: #2c3e7a; cursor: pointer; font-size: 13px; }
.filter-btn.active { background: #2c3e7a; color: white; }
.orders { padding: 0 16px 80px; }
.order-card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.order-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.order-id { font-weight: bold; color: #2c3e7a; font-size: 15px; }
.order-time { font-size: 12px; color: #aaa; }
.order-item { font-size: 15px; color: #333; margin-bottom: 4px; }
.order-price { font-size: 14px; color: #c0392b; font-weight: bold; }
.status-select { margin-top: 10px; width: 100%; padding: 8px; border-radius: 6px; border: 1.5px solid #ddd; font-size: 14px; cursor: pointer; }
.status-待處理 { border-left: 4px solid #e67e22; }
.status-製作中 { border-left: 4px solid #3498db; }
.status-完成 { border-left: 4px solid #27ae60; }
.status-取消 { border-left: 4px solid #e74c3c; }
.badge { padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
.badge-待處理 { background: #fef0e0; color: #e67e22; }
.badge-製作中 { background: #e0f0fe; color: #3498db; }
.badge-完成 { background: #e0fee8; color: #27ae60; }
.badge-取消 { background: #fee0e0; color: #e74c3c; }
.refresh-btn { background: white; border: 1.5px solid white; color: #2c3e7a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
.empty { text-align: center; padding: 60px 20px; color: #aaa; }
</style>
</head>
<body>

<div class="header">
  <h1>🐟 巷子裡 店家後台</h1>
  <button class="refresh-btn" onclick="loadOrders()">重新整理</button>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="num" id="total-count">0</div>
    <div class="label">總訂單</div>
  </div>
  <div class="stat-card">
    <div class="num" id="pending-count">0</div>
    <div class="label">待處理</div>
  </div>
  <div class="stat-card">
    <div class="num" id="today-revenue">$0</div>
    <div class="label">今日營收</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('全部', this)">全部</button>
  <button class="filter-btn" onclick="filter('待處理', this)">待處理</button>
  <button class="filter-btn" onclick="filter('製作中', this)">製作中</button>
  <button class="filter-btn" onclick="filter('完成', this)">完成</button>
</div>

<div class="orders" id="orders-container">
  <div class="empty">載入中...</div>
</div>

<script>
let allOrders = []
let currentFilter = '全部'

async function loadOrders() {
  const res = await fetch('/orders')
  const data = await res.json()
  allOrders = data.data
  updateStats()
  renderOrders()
}

function updateStats() {
  document.getElementById('total-count').textContent = allOrders.length
  document.getElementById('pending-count').textContent = allOrders.filter(o => o.status === '待處理').length
  const today = new Date().toDateString()
  const todayRevenue = allOrders
    .filter(o => new Date(o.created_at).toDateString() === today)
    .reduce((sum, o) => sum + o.item_price, 0)
  document.getElementById('today-revenue').textContent = '$' + todayRevenue
}

function filter(status, btn) {
  currentFilter = status
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderOrders()
}

function renderOrders() {
  const filtered = currentFilter === '全部' ? allOrders : allOrders.filter(o => o.status === currentFilter)
  const container = document.getElementById('orders-container')
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">沒有訂單</div>'
    return
  }
  container.innerHTML = filtered.map(order => {
    const time = new Date(order.created_at).toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    return `
    <div class="order-card status-${order.status}">
      <div class="order-top">
        <span class="order-id">#${order.id} ${order.customer_name}</span>
        <span class="badge badge-${order.status}">${order.status}</span>
      </div>
      <div class="order-item">${order.item_name}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="order-price">$${order.item_price}</span>
        <span class="order-time">${time}</span>
      </div>
      <select class="status-select" onchange="updateStatus(${order.id}, this.value)">
        <option ${order.status === '待處理' ? 'selected' : ''}>待處理</option>
        <option ${order.status === '製作中' ? 'selected' : ''}>製作中</option>
        <option ${order.status === '完成' ? 'selected' : ''}>完成</option>
        <option ${order.status === '取消' ? 'selected' : ''}>取消</option>
      </select>
    </div>`
  }).join('')
}

async function updateStatus(id, status) {
  await fetch('/order/' + id + '/status', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  })
  await loadOrders()
}

loadOrders()
setInterval(loadOrders, 30000)
</script>
</body>
</html>
